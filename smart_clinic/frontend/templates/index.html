<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart clinic Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
<h1>Doctor List</h1>
<ul id="doctors_list"></ul>
<div><a href="http://127.0.0.1:8000/admin/" target="_blank">admin site</a></div>
<div><a href="http://127.0.0.1:8000/doctors/" target="_blank">doctors list site</a></div>
<div><a href="http://127.0.0.1:8000/api/auth/register/" target="_blank">register list site</a></div>
<hr/>

<script>
    const token = localStorage.getItem("token");
    
    // Fetch Doctors
    fetch("/doctors/", {
        method: "GET",
        headers: {
            "Authorization": token ? "Bearer " + token : ""
        }
    })
    .then(response => response.json())
    .then(data => {
        const list = document.getElementById('doctors_list');
        list.innerHTML = ""; // Clear existing list
        if (Array.isArray(data)) {
            data.forEach(doctor => {
                const li = document.createElement('li');
                li.innerText = doctor.name;
                list.appendChild(li);
            });
        }
    }).catch(error => console.error("error is :", error));


</script>

<!--patient data-->
<h1>Patient List</h1>
<ul id="patient_list"></ul>

<div><a href="http://127.0.0.1:8000/patients/" target="_blank">patients list site</a></div>
<hr/>
<script>
    fetch("/patients/", {
        headers: {
            "Authorization": token ? "Bearer " + token : ""
        }
    })
        .then(response => response.json())
        .then(data => {
            const list = document.getElementById('patient_list');
            list.innerHTML = "";
            if (Array.isArray(data)) {
                data.forEach(patient => {
                    const li = document.createElement('li');
                    li.innerText = patient.name;
                    list.appendChild(li);
                });
            }
        }).catch(error => console.error("error is :", error))
</script>

<!--appointment data-->
<h1>Appointment List</h1>
<ul id="appointment_list"></ul>

<div><a href="http://127.0.0.1:8000/appointments/" target="_blank">appointments list site</a></div>
<hr/>

<!--registration page-->
<a href="http://127.0.0.1:8000/register/" >Register</a>

<script>
    fetch("/appointments/", {
        headers: {
            "Authorization": token ? "Bearer " + token : ""
        }
    })
        .then(response => response.json())
        .then(data => {
            const list = document.getElementById('appointment_list');
            list.innerHTML = "";
            if (Array.isArray(data)) {
                data.forEach(appointment => {
                    const li = document.createElement('li');
                    li.innerText = `Patient ${appointment.patient.name} visiting Doctor ${appointment.doctor.name} on ${new Date(appointment.date).toLocaleDateString()} (${appointment.status})`;
                    list.appendChild(li);
                });
            }
        }).catch(error => console.error("error is :", error))
</script>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
