<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Doctor Clinic Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Doctor list</h1>
    <ul id="doctors_list"></ul>
    <a href="http://127.0.0.1:8000/admin/" target="_blank">admin site</a>
    <a href="http://127.0.0.1:8000/doctors/" target="_blank">doctors list site</a>

    <script>
        fetch('http://127.0.0.1:8000/doctors/')
            .then(response => response.json())

            .then(data => {
                console.log("Data retrieved", data);
                const list = document.getElementById('doctors_list');
                list.innerHTML = ''; // basic clear before appending

                // Handle both paginated (.results) and unpaginated datasets
                const doctors = data.results ? data.results : data;

                doctors.forEach(doctor => {
                    const li = document.createElement('li');
                    li.className = "list-group-item d-flex justify-content-between align-items-center";
                    li.innerHTML = `
                    <div>
                        <h5 class="mb-1">${doctor.name}</h5>
                        <small class="text-muted">${doctor.specialization} | ${doctor.experience} Experience</small>
                    </div>
                `;
                    list.appendChild(li);
                });
            }).catch(error => console.error("Error fetching data:", error));
    

        // Initial load
        loadDoctors();

        // Form submission
        document.getElementById('doctorForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const nameData = document.getElementById('name').value;
            const specializationData = document.getElementById('specialization').value;
            const experienceData = document.getElementById('experience').value;

            fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // Add X-CSRFToken if needed by Django
                },
                body: JSON.stringify({
                    name: nameData,
                    specialization: specializationData,
                    experience: experienceData
                })
            })
                .then(response => {
                    if (response.ok) {
                        return response.json();
                    }
                    throw new Error('Network response was not ok.');
                })
                .then(data => {
                    console.log("Doctor created", data);
                    // reset form
                    document.getElementById('doctorForm').reset();
                    // reload list
                    loadDoctors();
                })
                .catch(error => console.error("Error creating doctor:", error));
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
